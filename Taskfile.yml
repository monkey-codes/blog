version: '3'

tasks:
  dev:
    desc: Start the Astro dev server
    cmd: pnpm dev

  build:
    desc: Build the static site
    cmd: pnpm build

  preview:
    desc: Preview the built site
    cmd: pnpm preview

  migrate:
    desc: Migrate Ghost posts to Astro content
    cmd: npx tsx scripts/migrate-ghost.ts {{.CLI_ARGS}}

  resume:dev:
    desc: Start the resume app dev server
    dir: resume
    cmd: pnpm dev

  resume:build:
    desc: Build the resume app into public/resume/
    dir: resume
    cmd: pnpm build

  build:all:
    desc: Build resume app then the blog
    cmds:
      - task: resume:build
      - task: build
